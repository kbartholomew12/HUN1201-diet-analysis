<style>
/* ============================================================
   Valencia College Design System — Colors & Typography
   ============================================================
   Font substitutions:
   - Adobe Garamond Pro  →  EB Garamond (Google Fonts)
   - Gotham              →  Montserrat (official Valencia alternate)

   Palette: earth tones (clay/terracotta + ochre/mustard on warm
   neutrals) in place of the standard Valencia red/gold. Token names
   (--vc-red, --vc-yellow, etc.) are kept as-is since they are wired
   through every screen — only the values change.
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap');
@import url('https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css');

/* ============================================================
   COLOR TOKENS
   ============================================================ */
:root {

  /* --- Brand Primary (earth tones: clay/terracotta) --- */
  --vc-red:           #A6512E;
  --vc-red-dark:      #7C3A1E;
  --vc-red-light:     #A6512E14;
  --vc-red-subtle:    #FBF2EC;

  /* --- Brand Accent (ochre/mustard) --- */
  --vc-yellow:        #C79A3D;
  --vc-yellow-dark:   #A67B27;
  --vc-yellow-light:  #F0E4C6;
  --vc-yellow-subtle: #FBF7EC;

  /* --- Neutrals (warm taupe/espresso) --- */
  --vc-black:         #2A2621;
  --vc-gray-90:       #3B352C;
  --vc-gray-70:       #5C5347;
  --vc-gray-50:       #7E7566;
  --vc-gray-30:       #A89E8C;
  --vc-gray-15:       #D5CBB9;
  --vc-gray-08:       #E9E2D2;
  --vc-gray-04:       #F5F1E6;
  --vc-white:         #FFFDF9;

  /* --- Semantic --- */
  --color-bg:               var(--vc-white);
  --color-bg-subtle:        var(--vc-gray-04);
  --color-bg-inverse:       var(--vc-black);
  --color-surface:          var(--vc-white);
  --color-surface-raised:   var(--vc-white);

  --color-fg:               var(--vc-black);
  --color-fg-muted:         var(--vc-gray-70);
  --color-fg-subtle:        var(--vc-gray-50);
  --color-fg-inverse:       var(--vc-white);

  --color-border:           var(--vc-gray-08);
  --color-border-strong:    var(--vc-gray-30);

  --color-primary:          var(--vc-red);
  --color-primary-hover:    var(--vc-red-dark);
  --color-accent:           var(--vc-yellow);
  --color-accent-hover:     var(--vc-yellow-dark);

  --color-link:             var(--vc-red);
  --color-link-hover:       var(--vc-red-dark);

  --color-focus-ring:       var(--vc-yellow);

  /* --- Status / Utility --- */
  --color-success:   #4C7A4A;
  --color-warning:   #B5651D;
  --color-error:     #9C4A3C;
  --color-info:      #3F6B66;


  /* ============================================================
     TYPOGRAPHY TOKENS
     ============================================================ */

  /* Font families */
  --font-serif:   'EB Garamond', 'Garamond', 'Palatino Linotype', serif;
  --font-sans:    'Montserrat', 'Arial', sans-serif;
  --font-mono:    'Courier New', 'Courier', monospace;

  /* Font sizes — Major Third scale (1.25) */
  --text-xs:    0.64rem;   /* 10.2px */
  --text-sm:    0.8rem;    /* 12.8px */
  --text-base:  1rem;      /* 16px */
  --text-md:    1.25rem;   /* 20px */
  --text-lg:    1.563rem;  /* 25px */
  --text-xl:    1.953rem;  /* 31px */
  --text-2xl:   2.441rem;  /* 39px */
  --text-3xl:   3.052rem;  /* 49px */
  --text-4xl:   3.815rem;  /* 61px */

  /* Font weights */
  --weight-light:     300;
  --weight-regular:   400;
  --weight-medium:    500;
  --weight-semibold:  600;
  --weight-bold:      700;
  --weight-extrabold: 800;

  /* Line heights */
  --leading-tight:   1.2;
  --leading-snug:    1.35;
  --leading-normal:  1.5;
  --leading-relaxed: 1.65;
  --leading-loose:   1.8;

  /* Letter spacing */
  --tracking-tight:  -0.02em;
  --tracking-normal:  0em;
  --tracking-wide:    0.04em;
  --tracking-wider:   0.08em;
  --tracking-caps:    0.12em;


  /* ============================================================
     SPACING TOKENS
     ============================================================ */

  --space-1:   4px;
  --space-2:   8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;
  --space-24: 96px;


  /* ============================================================
     BORDER RADIUS
     ============================================================ */

  --radius-sm:   2px;
  --radius-base: 4px;
  --radius-md:   6px;
  --radius-lg:  12px;
  --radius-xl:  20px;
  --radius-full: 9999px;


  /* ============================================================
     SHADOWS
     ============================================================ */

  --shadow-xs:  0 1px 2px rgba(0,0,0,0.06);
  --shadow-sm:  0 2px 8px rgba(0,0,0,0.08);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.10);
  --shadow-lg:  0 8px 32px rgba(0,0,0,0.12);
  --shadow-xl:  0 16px 48px rgba(0,0,0,0.14);


  /* ============================================================
     SEMANTIC TYPE STYLES
     ============================================================ */

  /* Applied via class or element — see below */
}

/* ============================================================
   ELEMENT DEFAULTS
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  line-height: var(--leading-normal);
  color: var(--color-fg);
  background: var(--color-bg);
  -webkit-font-smoothing: antialiased;
}

/* Display headings — Serif (EB Garamond) */
h1, .h1 {
  font-family: var(--font-serif);
  font-size: var(--text-3xl);
  font-weight: var(--weight-bold);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--color-fg);
}

h2, .h2 {
  font-family: var(--font-serif);
  font-size: var(--text-2xl);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-snug);
  color: var(--color-fg);
}

h3, .h3 {
  font-family: var(--font-sans);
  font-size: var(--text-xl);
  font-weight: var(--weight-bold);
  line-height: var(--leading-snug);
  color: var(--color-fg);
}

h4, .h4 {
  font-family: var(--font-sans);
  font-size: var(--text-lg);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-normal);
  color: var(--color-fg);
}

h5, .h5 {
  font-family: var(--font-sans);
  font-size: var(--text-md);
  font-weight: var(--weight-semibold);
  color: var(--color-fg);
}

h6, .h6 {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  font-weight: var(--weight-bold);
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  color: var(--color-fg-muted);
}

p {
  margin: 0 0 var(--space-4);
  line-height: var(--leading-relaxed);
}

.lead {
  font-size: var(--text-md);
  line-height: var(--leading-relaxed);
  color: var(--color-fg-muted);
}

small, .small {
  font-size: var(--text-sm);
  color: var(--color-fg-subtle);
}

.overline {
  font-family: var(--font-sans);
  font-size: var(--text-xs);
  font-weight: var(--weight-bold);
  letter-spacing: var(--tracking-caps);
  text-transform: uppercase;
  color: var(--color-fg-subtle);
}

a {
  color: var(--color-link);
  text-decoration: underline;
  text-underline-offset: 2px;
  transition: color 180ms ease;
}

a:hover { color: var(--color-link-hover); }

code, pre, .mono {
  font-family: var(--font-mono);
  font-size: 0.9em;
  background: var(--vc-gray-04);
  border-radius: var(--radius-sm);
  padding: 2px 5px;
}

/* ============================================================
   App-level additions
   ============================================================ */
html, body { margin: 0; }
button:focus-visible, input:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--color-focus-ring);
  outline-offset: 1px;
}
.print-report { display: none; }

@media print {
  .app-chrome { display: none !important; }
  .print-report { display: block !important; }
  body { background: #fff !important; }
}
</style>

    if (idx < 0) return;
    var next = Math.round((items[idx].servings + delta) * 2) / 2;
    if (next <= 0) items.splice(idx, 1);
    else items[idx] = Object.assign({}, items[idx], { servings: next });
    var meals = Object.assign({}, state.meals);
    meals[mealId] = items;
    update({ meals: meals });
  }

  function removeFood(mealId, foodId) {
    var items = state.meals[mealId].filter(function (i) {
      return i.foodId !== foodId;
    });
    var meals = Object.assign({}, state.meals);
    meals[mealId] = items;
    update({ meals: meals });
  }

  function setActiveMeal(id) {
    update({ activeMeal: id });
  }

  function setCategoryFilter(id) {
    update({ categoryFilter: id });
  }

  function setSearchTerm(value) {
    update({ searchTerm: value });
  }

  function generateReport() {
    var totals = NutritionData.computeDayTotals(state.meals);
    update({ screen: "dayreport", dayTotalsSnapshot: totals });
  }

  function goToQuestions() {
    if (state.questions.length > 0 && state.questionsVersion === QuestionEngine.QUESTION_SET_VERSION) {
      update({ screen: "questions" });
      return;
    }
    var scenario = NutritionData.SCENARIOS.find(function (s) {
      return s.id === state.scenarioId;
    });
    var targets = NutritionData.computeTargets(scenario);
    var seed = state.seed || Date.now() % 2147483647;
    var questions = QuestionEngine.generateQuestions({
      scenario: scenario,
      targets: targets,
      dayTotals: state.dayTotalsSnapshot,
      meals: state.meals,
      seed: seed,
    });
    update({
      screen: "questions",
      seed: seed,
      questions: questions,
      questionsVersion: QuestionEngine.QUESTION_SET_VERSION,
      answers: {},
      checked: {},
    });
  }

  function setAnswer(qid, idx) {
    if (state.checked[qid]) return;
    var answers = Object.assign({}, state.answers);
    answers[qid] = idx;
    update({ answers: answers });
  }

  function changeOpenAnswer(qid, value) {
    var answers = Object.assign({}, state.answers);
    answers[qid] = value;
    update({ answers: answers });
  }

  function changeStudentName(value) {
    update({ studentName: value });
  }

  function changeChallengeText(value) {
    update({ challengeText: value });
  }

  function submitAssessment() {
    var checked = Object.assign({}, state.checked);
    state.questions.forEach(function (q) {
      if (q.type === "mc") checked[q.id] = true;
    });
    update({ screen: "final", checked: checked });
  }

  function printPdf() {
    window.print();
  }

  // ------------------------------------------------------------
  // Formatting / grading helpers
  // ------------------------------------------------------------
  function escHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function fmt(n, decimals) {
    if (n === null || n === undefined) return "—";
    var d = decimals || 0;
    return Number(n).toLocaleString(undefined, { maximumFractionDigits: d, minimumFractionDigits: 0 });
  }

  var SODIUM_FLOOR_MG = 500;

  function nutrientStatus(key, consumed, target) {
    var tol = TOLERANCE_BAND_PCT;
    if (target === null || target === undefined) return null;
    var pct = target > 0 ? (consumed / target) * 100 : consumed > 0 ? 999 : 0;
    // Sodium's target (2,300 mg) is an upper limit, not a minimum -- anything
    // under it is fine. The only low-end concern is dropping below a safe
    // physiological floor, which is unrelated to the 2,300 mg target.
    if (key === "sodium") {
      if (consumed < SODIUM_FLOOR_MG) return { label: "Too Low", color: "bad" };
      if (pct <= 100) return { label: "Within Limit", color: "good" };
      if (pct <= 100 + tol) return { label: "Above Limit", color: "warn" };
      return { label: "Well Above", color: "bad" };
    }
    var limitKeys = ["addedSugar"];
    if (limitKeys.indexOf(key) !== -1) {
      if (pct <= 100) return { label: "Within Limit", color: "good" };
      if (pct <= 100 + tol) return { label: "Above Limit", color: "warn" };
      return { label: "Well Above", color: "bad" };
    }
    if (pct < 100 - 2 * tol) return { label: "Low", color: "bad" };
    if (pct < 100 - tol) return { label: "Slightly Low", color: "warn" };
    if (pct <= 100 + 2 * tol) return { label: "On Target", color: "good" };
    return { label: "High", color: "warn" };
  }

  function statusColor(c) {
    if (c === "good") return "var(--color-success)";
    if (c === "warn") return "var(--color-warning)";
    if (c === "bad") return "var(--vc-red)";
    return "var(--color-fg-muted)";
  }

  function badgeStyle(color) {
    return "font-size:10px; font-weight:700; padding:1px 7px; border-radius:var(--radius-full); color:#fff; background:" + statusColor(color) + ";";
  }

  function buildNutrientRow(key, label, unit, consumed, target) {
    var status = nutrientStatus(key, consumed, target);
    var pct = target ? Math.min((consumed / target) * 100, 160) : 0;
    var decimals = key === "vitE" || key === "iron" || key === "zinc" || key === "vitD" ? 1 : 0;
    return {
      key: key,
      label: label,
      unit: unit,
      consumedDisplay: fmt(consumed, decimals),
      targetDisplay: target === null || target === undefined ? "no set target" : fmt(target),
      statusLabel: status ? status.label : "",
      badgeStyle: status ? badgeStyle(status.color) : "display:none;",
      barStyle:
        "height:100%; width:" + pct + "%; background:" + (status ? statusColor(status.color) : "var(--vc-gray-30)") + "; transition:width 200ms ease;",
    };
  }

  // ------------------------------------------------------------
  // View-model
  // ------------------------------------------------------------
  function buildMealsSummary(interactive) {
    return NutritionData.MEAL_PERIODS.map(function (mp) {
      var items = state.meals[mp.id]
        .map(function (entry) {
          var food = NutritionData.foodById(entry.foodId);
          if (!food) return null;
          var kcalSub = fmt(food.kcal * entry.servings);
          var row = {
            foodId: entry.foodId,
            name: food.name,
            servings: entry.servings,
            servingsDisplay: entry.servings,
            kcalSub: kcalSub,
            printLabel: food.name + " — " + entry.servings + "× " + food.serving + " (" + kcalSub + " kcal)",
          };
          if (interactive) {
            row.mealId = mp.id;
          }
          return row;
        })
        .filter(Boolean);
      return { id: mp.id, label: mp.label, items: items, isEmpty: items.length === 0 };
    });
  }

  function computeViewModel() {
    var vm = { screen: state.screen };
    var scenario = NutritionData.SCENARIOS.find(function (s) {
      return s.id === state.scenarioId;
    });
    vm.scenario = scenario || null;
    if (!scenario) return vm;

    var targets = NutritionData.computeTargets(scenario);
    var macroPct = NutritionData.macroPercents(targets);
    vm.targets = targets;
    vm.macroPct = macroPct;
    vm.hasScenario = true;

    if (state.screen === "report") {
      var microLabels = [
        ["vitA", "Vitamin A (mcg)"],
        ["vitD", "Vitamin D (mcg)"],
        ["vitE", "Vitamin E (mg)"],
        ["vitC", "Vitamin C (mg)"],
        ["thiamin", "Thiamin (mg)"],
        ["riboflavin", "Riboflavin (mg)"],
        ["b6", "Vitamin B6 (mg)"],
        ["b12", "Vitamin B12 (mcg)"],
        ["folate", "Folate (mcg)"],
        ["sodium", "Sodium (mg, limit)"],
        ["potassium", "Potassium (mg)"],
        ["calcium", "Calcium (mg)"],
        ["magnesium", "Magnesium (mg)"],
        ["iron", "Iron (mg)"],
        ["zinc", "Zinc (mg)"],
        ["fiber", "Fiber (g)"],
      ];
      vm.microTargetRows = microLabels.map(function (pair) {
        var key = pair[0],
          label = pair[1];
        var decimals = key === "vitE" || key === "iron" || key === "zinc" ? 1 : 0;
        return { label: label, display: fmt(targets[key], decimals) };
      });
    }

    if (state.screen === "builder" || state.screen === "dayreport") {
      var totals = state.screen === "dayreport" ? state.dayTotalsSnapshot : NutritionData.computeDayTotals(state.meals);
      var dayTotals = totals || {};
      var kcalPct = targets.kcal ? Math.min(((dayTotals.kcal || 0) / targets.kcal) * 100, 140) : 0;
      vm.dayTotals = Object.assign({}, dayTotals, {
        kcalDisplay: fmt(dayTotals.kcal || 0),
        proteinDisplay: fmt(dayTotals.protein || 0),
        carbsDisplay: fmt(dayTotals.carbs || 0),
        fatDisplay: fmt(dayTotals.fat || 0),
        kcalBarStyle: "height:100%; width:" + kcalPct + "%; background:var(--vc-red); transition:width 200ms ease;",
      });
    }

    if (state.screen === "builder") {
      vm.categories = [{ id: "all", label: "All", icon: "bi-grid" }].concat(NutritionData.CATEGORIES).map(function (c) {
        var active = state.categoryFilter === c.id;
        return Object.assign({}, c, {
          active: active,
          chipStyle:
            "border:1px solid " +
            (active ? "var(--vc-red)" : "var(--vc-gray-15)") +
            "; background:" +
            (active ? "var(--vc-red)" : "#fff") +
            "; color:" +
            (active ? "#fff" : "var(--color-fg)") +
            "; border-radius:var(--radius-full); padding:6px 13px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit;",
        });
      });

      vm.mealPeriods = NutritionData.MEAL_PERIODS.map(function (mp) {
        var active = state.activeMeal === mp.id;
        return Object.assign({}, mp, {
          count: state.meals[mp.id].length,
          active: active,
          tabStyle:
            "border:none; border-bottom:3px solid " +
            (active ? "var(--vc-red)" : "transparent") +
            "; background:none; color:" +
            (active ? "var(--vc-red)" : "var(--color-fg-muted)") +
            "; padding:8px 4px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;",
        });
      });
      var activeMp = NutritionData.MEAL_PERIODS.find(function (m) {
        return m.id === state.activeMeal;
      });
      vm.activeMealLabel = activeMp ? activeMp.label : "";

      var term = state.searchTerm.trim().toLowerCase();
      vm.searchTerm = state.searchTerm;
      vm.filteredFoods = NutritionData.FOODS.filter(function (f) {
        if (state.categoryFilter !== "all" && f.category !== state.categoryFilter) return false;
        if (term && f.name.toLowerCase().indexOf(term) === -1) return false;
        return true;
      });

      vm.builderMealsSummary = buildMealsSummary(true);

      // Breakfast, lunch, and dinner must each have at least one item --
      // snacks stay optional. There's no nutrient-target requirement here;
      // this only checks that all three meals exist.
      var missingMeals = ["breakfast", "lunch", "dinner"].filter(function (id) {
        return state.meals[id].length === 0;
      });
      vm.cantGenerateReport = missingMeals.length > 0;
      vm.generateReportHelperText = vm.cantGenerateReport
        ? "Add at least one food to " +
          missingMeals
            .map(function (id) {
              return NutritionData.MEAL_PERIODS.find(function (mp) {
                return mp.id === id;
              }).label;
            })
            .join(" and ") +
          " to continue. Snacks are optional."
        : "";
      vm.generateReportButtonStyle =
        "width:100%; margin-top:16px; background:" +
        (vm.cantGenerateReport ? "var(--vc-gray-15)" : "var(--vc-red)") +
        "; color:#fff; border:none; border-radius:var(--radius-base); padding:13px; font-size:14px; font-weight:700; cursor:" +
        (vm.cantGenerateReport ? "not-allowed" : "pointer") +
        "; font-family:inherit;";
    }

    if (state.dayTotalsSnapshot) {
      var snap = state.dayTotalsSnapshot || {};
      var macroDefs = [
        ["kcal", "Calories", "kcal"],
        ["protein", "Protein", "g"],
        ["carbs", "Carbohydrate", "g"],
        ["fat", "Fat", "g"],
        ["fiber", "Fiber", "g"],
        ["addedSugar", "Added Sugar", "g"],
      ];
      vm.macroRows = macroDefs.map(function (d) {
        return buildNutrientRow(d[0], d[1], d[2], snap[d[0]] || 0, targets[d[0]]);
      });
      var vitDefs = [
        ["vitA", "Vitamin A", "mcg"],
        ["vitD", "Vitamin D", "mcg"],
        ["vitE", "Vitamin E", "mg"],
        ["vitC", "Vitamin C", "mg"],
        ["thiamin", "Thiamin", "mg"],
        ["riboflavin", "Riboflavin", "mg"],
        ["b6", "Vitamin B6", "mg"],
        ["b12", "Vitamin B12", "mcg"],
        ["folate", "Folate", "mcg"],
      ];
      vm.vitaminRows = vitDefs.map(function (d) {
        return buildNutrientRow(d[0], d[1], d[2], snap[d[0]] || 0, targets[d[0]]);
      });
      var minDefs = [
        ["sodium", "Sodium", "mg"],
        ["potassium", "Potassium", "mg"],
        ["calcium", "Calcium", "mg"],
        ["magnesium", "Magnesium", "mg"],
        ["iron", "Iron", "mg"],
        ["zinc", "Zinc", "mg"],
      ];
      vm.mineralRows = minDefs.map(function (d) {
        return buildNutrientRow(d[0], d[1], d[2], snap[d[0]] || 0, targets[d[0]]);
      });
      vm.allNutrientRowsForPrint = vm.macroRows.concat(vm.vitaminRows, vm.mineralRows);
      vm.readOnlyMealsSummary = buildMealsSummary(false);
    }

    if (state.screen === "questions" || state.screen === "final") {
      var answers = state.answers;
      var checked = state.checked;
      var answeredCount = 0;
      var correctCount = 0;
      var mcTotal = 0;

      var questionsList = state.questions.map(function (q, i) {
        var number = i + 1;
        var isMc = q.type === "mc";
        var isOpen = q.type === "open";
        if (isMc) mcTotal++;
        var locked = isMc ? !!checked[q.id] : false;
        var selectedIndex = answers[q.id];
        if (isMc && selectedIndex !== undefined) answeredCount++;
        if (isOpen && (answers[q.id] || "").trim().length > 0) answeredCount++;
        if (locked && selectedIndex === q.correctIndex) correctCount++;

        var options = isMc
          ? q.options.map(function (text, idx) {
              var selected = selectedIndex === idx;
              var isCorrectOpt = idx === q.correctIndex;
              var rowBorder = "var(--vc-gray-15)";
              var rowBg = "#fff";
              var showIcon = false,
                iconClass = "",
                iconStyle = "";
              if (locked) {
                if (isCorrectOpt) {
                  rowBorder = "var(--color-success)";
                  rowBg = "rgba(46,125,50,0.06)";
                  showIcon = true;
                  iconClass = "bi bi-check-circle-fill";
                  iconStyle = "color:var(--color-success);";
                } else if (selected) {
                  rowBorder = "var(--vc-red)";
                  rowBg = "var(--vc-red-subtle)";
                  showIcon = true;
                  iconClass = "bi bi-x-circle-fill";
                  iconStyle = "color:var(--vc-red);";
                }
              } else if (selected) {
                rowBorder = "var(--vc-red)";
                rowBg = "var(--vc-red-subtle)";
              }
              return {
                text: text,
                selected: selected,
                showIcon: showIcon,
                iconClass: iconClass,
                iconStyle: iconStyle,
                idx: idx,
                rowStyle:
                  "display:flex; align-items:center; gap:6px; border:1px solid " +
                  rowBorder +
                  "; background:" +
                  rowBg +
                  "; border-radius:var(--radius-base); padding:11px 13px; font-size:13.5px; cursor:" +
                  (locked ? "default" : "pointer") +
                  ";",
              };
            })
          : [];

        var answerText = isOpen ? answers[q.id] || "" : "";
        var wordCount = answerText.trim().length ? answerText.trim().split(/\s+/).length : 0;

        return {
          id: q.id,
          number: number,
          loTitle: LO_TITLES[q.lo],
          prompt: q.prompt,
          isMc: isMc,
          isOpen: isOpen,
          radioName: "q-" + q.id,
          options: options,
          locked: locked,
          answered: isMc ? selectedIndex !== undefined : answerText.trim().length > 0,
          correctAnswerText: isMc ? q.options[q.correctIndex] : "",
          resultLabel: locked ? (selectedIndex === q.correctIndex ? "Correct" : "Not quite") : "",
          explanation: q.explanation,
          explanationBoxStyle:
            "margin-top:10px; padding:12px 14px; border-radius:var(--radius-base); font-size:12.5px; line-height:1.6; background:" +
            (locked && selectedIndex === q.correctIndex ? "rgba(46,125,50,0.08)" : "var(--vc-red-subtle)") +
            "; color:" +
            (locked && selectedIndex === q.correctIndex ? "var(--color-success)" : "var(--vc-red)") +
            ";",
          placeholder: q.placeholder,
          answerText: answerText,
          wordCountText: wordCount + " word" + (wordCount === 1 ? "" : "s"),
          printAnswer: isMc ? (q.options[selectedIndex] !== undefined ? q.options[selectedIndex] : "(not answered)") : answerText || "(not answered)",
        };
      });

      vm.questionsList = questionsList;
      vm.questionsForPrint = questionsList;
      vm.questionCount = state.questions.length;
      vm.progressText = answeredCount + " of " + state.questions.length + " answered.";
      vm.scoreText = correctCount + " / " + mcTotal;

      var allMcAnswered = questionsList
        .filter(function (q) {
          return q.isMc;
        })
        .every(function (q) {
          return q.answered;
        });
      var allOpenFilled = questionsList
        .filter(function (q) {
          return q.isOpen;
        })
        .every(function (q) {
          return q.answerText.trim().length > 0;
        });
      vm.cantSubmit = !(allMcAnswered && allOpenFilled && questionsList.length > 0);
      vm.submitHelperText = vm.cantSubmit
        ? "Answer every multiple-choice question and complete both written responses to submit."
        : "All set — ready to submit. Once you submit, answers are locked and graded.";
      vm.submitButtonStyle =
        "background:" +
        (vm.cantSubmit ? "var(--vc-gray-15)" : "var(--vc-red)") +
        "; color:#fff; border:none; border-radius:var(--radius-base); padding:13px 26px; font-size:14px; font-weight:700; cursor:" +
        (vm.cantSubmit ? "not-allowed" : "pointer") +
        "; font-family:inherit;";

      vm.missedQuestions = questionsList.filter(function (q) {
        return q.isMc && q.locked && q.resultLabel === "Not quite";
      });
    }

    if (state.screen === "final") {
      vm.studentName = state.studentName;
    }

    vm.challengeText = state.challengeText;

    vm.printStudentName = state.studentName || "____________________";
    vm.printDate = new Date().toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });

    return vm;
  }

      '<div class="overline" style="color:var(--vc-red); margin-bottom:10px;">Nutrition For Fitness — Case Study Assignment</div>' +

      '<div style="max-width:760px; margin:0 auto 36px; background:var(--vc-red-subtle); border:1px solid var(--vc-red-light); border-radius:var(--radius-md); padding:18px 22px; text-align:left;">' +
      '<div style="font-weight:700; font-size:13px; margin-bottom:10px;">Before You Start</div>' +

      '<span style="flex:none; width:22px; height:22px; border-radius:var(--radius-full); background:var(--vc-red); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center;">1</span>' +

      '<div style="display:flex; gap:10px; align-items:flex-start;">' +
      '<span style="flex:none; width:22px; height:22px; border-radius:var(--radius-full); background:var(--vc-red); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center;">2</span>' +
      '<div style="font-size:12.5px; line-height:1.6;"><strong>All three meals are required.</strong> You must add at least one food to breakfast, lunch, and dinner before you can continue to the next step. You do not need to hit any specific nutrient target to move on — just build a realistic day.</div></div>' +

  }

  var DIET_TYPE_LABELS = {

          '<i class="bi bi-tree" style="color:var(--vc-yellow-dark);"></i> Diet Pattern: ' + escHtml(DIET_TYPE_LABELS[scenario.dietType]) + "</div>"

    var considerationsHtml =
      scenario.considerations && scenario.considerations.length
        ? '<div style="background:var(--vc-red-subtle); border:1px solid var(--vc-red-light); border-radius:var(--radius-md); padding:18px 20px; margin-bottom:20px;">' +

    return (

      '<div class="overline" style="color:var(--vc-red);">Step 1 of 4 — Case Scenario</div></div>' +
      '<h1 style="margin:0 0 4px;">' + escHtml(scenario.name) + "’s Nutrient Needs Report</h1>" +

      '<div class="small" style="text-transform:uppercase; letter-spacing:0.06em;">Activity Level</div>' +
      '<div style="font-weight:600; margin-top:4px;">' + escHtml(scenario.activityLabel) + "</div></div>" +
      '<div style="background:var(--vc-gray-04); border-radius:var(--radius-base); padding:14px;">' +
      '<div class="small" style="text-transform:uppercase; letter-spacing:0.06em;">Estimated Body Fat</div>' +

      '<div style="background:var(--vc-gray-04); border-radius:var(--radius-base); padding:14px;">' +
      '<div class="small" style="text-transform:uppercase; letter-spacing:0.06em;">Goal</div>' +

      "</div></div>" +
      '<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">' +
      '<div style="background:#fff; border-radius:var(--radius-md); box-shadow:var(--shadow-sm); padding:24px;">' +
      '<h3 style="margin:0 0 14px;">Energy Needs</h3>' +
      '<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--color-border);"><span>BMR (Mifflin-St Jeor)</span><strong>' +

  function renderBuilder(vm) {

    var foodCards = vm.filteredFoods
      .map(function (food) {

    var mealBlocks = vm.builderMealsSummary

                  '<div style="flex:1; min-width:0;">' +
                  '<div style="font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + escHtml(item.name) + "</div>" +

                  '<button style="width:22px; height:22px; border:1px solid var(--vc-gray-15); background:#fff; border-radius:4px; cursor:pointer; font-size:12px; line-height:1;" data-action="dec-food" data-meal="' +

                  '<button style="width:22px; height:22px; border:none; background:none; color:var(--vc-red); cursor:pointer; font-size:13px;" data-action="remove-food" data-meal="' +
                  item.mealId + '" data-food-id="' + item.foodId + '"><i class="bi bi-trash"></i></button>' +
                  "</div></div>"

              .join("");
        return (

    var dietReminder =

          escHtml(scenario.name) + " is lacto-ovo vegetarian.</strong> Do not choose meat, poultry, or fish/seafood for " + escHtml(scenario.possessive) + ' day — dairy and eggs are fine.</div>'
        : scenario.dietType === "vegan"
        ? '<div style="background:var(--vc-yellow-subtle); border:1px solid var(--vc-yellow-light); border-radius:var(--radius-md); padding:14px 18px; margin-bottom:16px; font-size:12.5px; line-height:1.6;"><i class="bi bi-tree" style="color:var(--vc-yellow-dark);"></i> <strong>' +
          escHtml(scenario.name) + " is vegan.</strong> Avoid all animal products — meat, poultry, fish/seafood, dairy, eggs, and honey — when building " + escHtml(scenario.possessive) + ' day.</div>'

      '<div style="display:flex; gap:10px; align-items:flex-start;">' +
      '<span style="flex:none; width:24px; height:24px; border-radius:var(--radius-full); background:var(--vc-red); color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;">1</span>' +
      '<div style="font-size:12.5px; line-height:1.5;"><strong>Pick a meal.</strong> Use the Breakfast / Lunch / Dinner / Snacks tabs below. Breakfast, lunch, and dinner are all required (each with a beverage) — snacks are optional.</div></div>' +
      '<div style="display:flex; gap:10px; align-items:flex-start;">' +
      '<span style="flex:none; width:24px; height:24px; border-radius:var(--radius-full); background:var(--vc-red); color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;">2</span>' +

      '<div style="font-size:12.5px; line-height:1.5;"><strong>Adjust portions.</strong> In "' + escHtml(scenario.name) + "'s Day So Far\" on the right, use − / + next to any item to change servings, or the trash icon to remove it.</div></div>" +
      "</div>" +

      '<div style="display:flex; gap:24px; align-items:flex-start;">' +

      '<div style="display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;">' +
      '<div style="position:relative; flex:1; min-width:200px;">' +
      '<i class="bi bi-search" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--vc-gray-30); font-size:13px;"></i>' +
      '<input id="search-input" data-field="search" value="' + escHtml(vm.searchTerm) +
      '" placeholder="Search foods…" style="width:100%; box-sizing:border-box; padding:10px 12px 10px 32px; border:1px solid var(--vc-gray-15); border-radius:var(--radius-base); font-family:inherit; font-size:13px; outline:none;"/>' +
      "</div></div>" +
      '<div style="display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;">' + chips + "</div>" +
      '<div style="color:var(--color-fg-muted); font-size:12px; margin-bottom:10px;">Step 2: click a card below to add it to <strong>' +

      "</div></div>" +
      '<div style="flex:1; min-width:320px; position:sticky; top:16px;">' +
      '<div style="background:#fff; border-radius:var(--radius-md); box-shadow:var(--shadow-sm); padding:20px;">' +

  function renderDayReport(vm) {
    var scenario = vm.scenario;

    function macroRowHtml(row) {
      return (
        '<div style="margin-bottom:12px;">' +
        '<div style="display:flex; justify-content:space-between; font-size:13.5px; margin-bottom:4px;">' +
        "<span>" + escHtml(row.label) + "</span>" +
        "<span>" + row.consumedDisplay + " " + row.unit + ' <span class="small">/ ' + row.targetDisplay + '</span> <span style="' +
        row.badgeStyle + '">' + row.statusLabel + "</span></span></div>" +
        '<div style="height:7px; background:var(--vc-gray-08); border-radius:4px; overflow:hidden;"><div style="' + row.barStyle + '"></div></div>' +
        "</div>"
      );
    }

    function microRowHtml(row) {
      return (

    }

      '<div class="overline" style="color:var(--vc-red); margin-bottom:6px;">Step 3 of 4 — Nutrient Comparison Report</div>' +

      "</div>" +
      '<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:28px;">' +
      '<div style="background:#fff; border-radius:var(--radius-md); box-shadow:var(--shadow-sm); padding:24px;">' +

  function renderQuestionCard(q, questionCount) {
    var body = "";
    if (q.isMc) {
      var options = q.options
        .map(function (opt) {
          return (
            '<label style="' + opt.rowStyle + '">' +
            '<input type="radio" name="' + q.radioName + '" ' + (opt.selected ? "checked" : "") + " " + (q.locked ? "disabled" : "") +
            ' data-action="select-answer" data-qid="' + q.id + '" data-idx="' + opt.idx + '" style="margin-right:10px;"/>' +
            '<span style="flex:1;">' + escHtml(opt.text) + "</span>" +
            (opt.showIcon ? '<i class="' + opt.iconClass + '" style="' + opt.iconStyle + '"></i>' : "") +
            "</label>"
          );
        })
        .join("");
      body =
        '<div style="display:flex; flex-direction:column; gap:8px;">' + options + "</div>" +
        (q.locked
          ? '<div style="' + q.explanationBoxStyle + '"><strong>' + q.resultLabel + "</strong> — " + escHtml(q.explanation) + "</div>"
          : "");
    } else if (q.isOpen) {
      body =
        '<textarea id="answer-' + q.id + '" data-field="answer-text" data-qid="' + q.id +
        '" placeholder="' + escHtml(q.placeholder) +
        '" style="width:100%; box-sizing:border-box; min-height:110px; padding:12px; border:1px solid var(--vc-gray-15); border-radius:var(--radius-base); font-family:inherit; font-size:13.5px; outline:none; resize:vertical;">' +
        escHtml(q.answerText) +
        "</textarea>" +
        '<div class="small" style="margin-top:4px;">' + q.wordCountText + "</div>";
    }

    return (
      '<div style="background:#fff; border-radius:var(--radius-md); box-shadow:var(--shadow-sm); padding:22px;">' +
      '<div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;">' +
      '<span class="overline" style="color:var(--vc-red);">' + escHtml(q.loTitle) + "</span>" +
      '<span class="small">Question ' + q.number + " of " + questionCount + "</span></div>" +
      '<p style="font-size:15px; line-height:1.6; margin:0 0 14px; font-weight:500;">' + escHtml(q.prompt) + "</p>" +
      body +
      "</div>"
    );
  }

  function renderQuestions(vm) {
    var cards = vm.questionsList
      .map(function (q) {
        return renderQuestionCard(q, vm.questionCount);
      })
      .join("");
    return (
      '<div class="overline" style="color:var(--vc-red); margin-bottom:6px;">Step 4 of 4 — Assessment Questions</div>' +
      '<h1 style="margin:0 0 6px;">Show What You Know</h1>' +
      '<p class="lead" style="margin-bottom:6px;">These ' + vm.questionCount + " questions are generated from " + escHtml(vm.scenario.name) +
      "'s case and the exact foods you chose. " + vm.progressText + "</p>" +
      '<div style="display:flex; flex-direction:column; gap:16px; margin:20px 0 28px;">' + cards + "</div>" +
      '<div style="display:flex; justify-content:flex-end; align-items:center; gap:14px;">' +
      '<span class="small">' + vm.submitHelperText + "</span>" +
      '<button ' + (vm.cantSubmit ? "disabled" : "") + ' style="' + vm.submitButtonStyle + '" data-action="submit-assessment">' +
      'Submit Assessment <i class="bi bi-check2-circle"></i></button></div>'
    );
  }

  function renderFinal(vm) {
    var missed = vm.missedQuestions || [];
    var missedHtml;
    if (missed.length > 0) {
      missedHtml =
        '<div style="background:#fff; border-radius:var(--radius-md); box-shadow:var(--shadow-sm); padding:22px; text-align:left; margin-bottom:20px;">' +
        '<h3 style="margin:0 0 14px;">Questions You Missed (' + missed.length + ")</h3>" +
        missed
          .map(function (q, idx) {
            return (
              '<div style="' + (idx < missed.length - 1 ? "margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid var(--color-border);" : "") + '">' +
              '<div class="overline" style="color:var(--vc-red); margin-bottom:4px;">' + escHtml(q.loTitle) + " — Question " + q.number + "</div>" +
              '<div style="font-size:13.5px; font-weight:600; margin-bottom:6px;">' + escHtml(q.prompt) + "</div>" +
              '<div style="font-size:12.5px; margin-bottom:4px;">Your answer: <strong style="color:var(--vc-red);">' + escHtml(q.printAnswer) + "</strong></div>" +
              '<div style="font-size:12.5px; margin-bottom:4px;">Correct answer: <strong style="color:var(--color-success);">' + escHtml(q.correctAnswerText) + "</strong></div>" +
              '<div style="font-size:12.5px; color:var(--color-fg-muted); line-height:1.6;">' + escHtml(q.explanation) + "</div>" +
              "</div>"
            );
          })
          .join("") +
        "</div>";
    } else {
      missedHtml =
        '<div style="background:rgba(46,125,50,0.08); border-radius:var(--radius-md); padding:16px 20px; text-align:left; margin-bottom:20px; color:var(--color-success); font-size:13.5px; font-weight:600;">' +
        '<i class="bi bi-check-circle-fill"></i>&nbsp; Nice work — you answered every multiple-choice question correctly.' +
        "</div>";
    }

    return (
      '<div style="text-align:center; max-width:700px; margin:0 auto;">' +
      '<i class="bi bi-clipboard2-check" style="font-size:44px; color:var(--vc-red);"></i>' +
      '<h1 style="margin:14px 0 8px;">Assessment Complete</h1>' +
      '<p class="lead" style="margin-bottom:20px;">You scored <strong>' + vm.scoreText +
      "</strong> on the multiple-choice questions.</p>" +
      missedHtml +
      '<div style="background:#fff; border:1px solid var(--vc-gray-15); border-radius:var(--radius-md); padding:22px; text-align:left; margin-bottom:20px;">' +
      '<div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">' +
      '<i class="bi bi-flag" style="color:var(--vc-yellow-dark);"></i>' +
      '<h3 style="margin:0;">Challenge an Answer (Optional)</h3></div>' +
      '<p style="font-size:13px; color:var(--color-fg-muted); line-height:1.6; margin:0 0 12px;">Now that you\'ve seen your results above, if you believe one of your answers was marked incorrect but you can support it as correct, explain your reasoning here and <strong>cite a source</strong> — your textbook (with chapter/page), a course reading, or a reputable nutrition resource. This is optional, won\'t change your score automatically, and your instructor will review it. It will be included in your submitted PDF.</p>' +
      '<textarea id="challenge-text-input" data-field="challenge-text" placeholder="Example: I answered &quot;X&quot; on Question 7 (Learning Outcome 3). I believe this is correct because... Source: [textbook title, chapter/page, or article name and link]" style="width:100%; box-sizing:border-box; min-height:110px; padding:12px; border:1px solid var(--vc-gray-15); border-radius:var(--radius-base); font-family:inherit; font-size:13.5px; outline:none; resize:vertical;">' +
      escHtml(vm.challengeText) +
      "</textarea></div>" +
      '<div style="background:#fff; border-radius:var(--radius-md); box-shadow:var(--shadow-sm); padding:24px; text-align:left; margin-bottom:20px;">' +
      '<p class="small" style="margin:0 0 10px;">Enter your name, then generate your PDF to submit in Canvas.</p>' +
      '<label class="small" style="display:block; margin-bottom:6px; font-weight:600;">Student Name</label>' +
      '<input id="student-name-input" data-field="student-name" value="' + escHtml(vm.studentName) +
      '" placeholder="Enter your full name" style="width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid var(--vc-gray-15); border-radius:var(--radius-base); font-family:inherit; font-size:14px; outline:none;"/>' +
      "</div>" +
      '<div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">' +
      '<button style="background:var(--vc-red); color:#fff; border:none; border-radius:var(--radius-base); padding:14px 26px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit;" data-action="print-pdf">' +
      '<i class="bi bi-file-earmark-pdf"></i> Generate PDF &amp; Print</button>' +
      '<button style="background:#fff; border:1px solid var(--vc-gray-30); color:var(--color-fg); border-radius:var(--radius-base); padding:14px 22px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit;" data-action="go-questions">' +
      "Review Answers</button></div>" +
      '<div style="background:var(--vc-red-subtle); border:1px solid var(--vc-red-light); border-radius:var(--radius-md); padding:18px 20px; margin-top:24px; text-align:left;">' +
      '<div style="font-weight:700; font-size:13px; margin-bottom:12px; display:flex; align-items:center; gap:8px;"><i class="bi bi-upload" style="color:var(--vc-red);"></i> How to Turn This In</div>' +
      '<div style="display:flex; flex-direction:column; gap:12px;">' +
      '<div style="display:flex; gap:10px; align-items:flex-start;">' +
      '<span style="flex:none; width:24px; height:24px; border-radius:var(--radius-full); background:var(--vc-red); color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;">1</span>' +
      '<div style="font-size:12.5px; line-height:1.6;"><strong>Click "Generate PDF &amp; Print"</strong> above. When the print dialog opens, set the destination/printer to <strong>"Save as PDF"</strong> (not a physical printer).</div></div>' +
      '<div style="display:flex; gap:10px; align-items:flex-start;">' +
      '<span style="flex:none; width:24px; height:24px; border-radius:var(--radius-full); background:var(--vc-red); color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;">2</span>' +
      '<div style="font-size:12.5px; line-height:1.6;"><strong>Save the PDF to your computer</strong> somewhere you can find it — for example, name the file <strong>YourLastName_NutritionAssessment.pdf</strong>. This one file contains your case study, full food record, nutrient report, and every question answer.</div></div>' +
      '<div style="display:flex; gap:10px; align-items:flex-start;">' +
      '<span style="flex:none; width:24px; height:24px; border-radius:var(--radius-full); background:var(--vc-red); color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;">3</span>' +
      '<div style="font-size:12.5px; line-height:1.6;"><strong>Go to the Canvas assignment</strong> for this case study, <strong>upload the saved PDF</strong>, and click Submit in Canvas. This tool does not turn the assignment in for you — it isn’t complete until the PDF is uploaded and submitted in Canvas.</div></div>' +
      "</div></div>" +
      "</div>"
    );
  }

  function renderPrintReport(vm) {
    if (!vm.hasScenario) return "";
    var scenario = vm.scenario,
      targets = vm.targets,
      macroPct = vm.macroPct;

    var mealsHtml = (vm.readOnlyMealsSummary || [])
      .map(function (meal) {
        var itemsHtml = meal.isEmpty
          ? '<div style="font-size:11.5px; color:#7E7566; font-style:italic;">No items selected</div>'
          : meal.items
              .map(function (item) {
                return (
                  '<div style="font-size:11.5px; display:flex; justify-content:space-between; padding:2px 0; border-bottom:1px solid #eee;">' +
                  "<span>" + escHtml(item.printLabel) + "</span><span>" + item.kcalSub + " kcal</span></div>"
                );
              })
              .join("");
        return (
          '<div style="margin-bottom:8px;"><div style="font-size:13px; font-weight:700; margin-bottom:3px;">' +
          escHtml(meal.label) + "</div>" + itemsHtml + "</div>"
        );
      })
      .join("");

    var nutrientRowsHtml = (vm.allNutrientRowsForPrint || [])
      .map(function (row) {
        return (
          '<tr><td style="padding:3px 4px; border-bottom:1px solid #eee;">' + escHtml(row.label) +
          '</td><td style="text-align:right; padding:3px 4px; border-bottom:1px solid #eee;">' + row.consumedDisplay + " " + row.unit +
          '</td><td style="text-align:right; padding:3px 4px; border-bottom:1px solid #eee;">' + row.targetDisplay + " " + row.unit +
          '</td><td style="text-align:right; padding:3px 4px; border-bottom:1px solid #eee;">' + row.statusLabel + "</td></tr>"
        );
      })
      .join("");

    var questionsHtml = (vm.questionsForPrint || [])
      .map(function (q) {
        return (
          '<div style="margin-bottom:14px;">' +
          '<div style="font-size:11px; color:#A6512E; font-weight:700; text-transform:uppercase;">' + escHtml(q.loTitle) + " — Question " + q.number + "</div>" +
          '<div style="font-size:12.5px; font-weight:600; margin:3px 0 5px;">' + escHtml(q.prompt) + "</div>" +
          '<div style="font-size:12px; margin-bottom:2px;"><strong>Answer:</strong> ' + escHtml(q.printAnswer) + "</div>" +
          (q.isMc ? '<div style="font-size:11px; color:#5C5347;">' + escHtml(q.resultLabel) + " — " + escHtml(q.explanation) + "</div>" : "") +
          "</div>"
        );
      })
      .join("");

    return (
      '<div style="display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid #A6512E; padding-bottom:12px; margin-bottom:16px;">' +
      "<div><div style=\"font-family:var(--font-serif); font-weight:700; font-size:22px;\">Valencia College — Nutrition for Fitness</div>" +
      '<div style="font-size:12px; color:#5C5347;">24-Hour Case Study Assessment Report</div></div>' +
      '<div style="text-align:right; font-size:12px;"><div><strong>Student:</strong> ' + escHtml(vm.printStudentName) + "</div>" +
      "<div><strong>Date:</strong> " + escHtml(vm.printDate) + "</div></div></div>" +
      '<h2 style="font-size:18px; margin:18px 0 8px;">Case Scenario: ' + escHtml(scenario.name) + " — " + escHtml(scenario.role) + "</h2>" +
      '<p style="font-size:12.5px; line-height:1.6;">' + escHtml(scenario.blurb) + "</p>" +
      '<table style="width:100%; border-collapse:collapse; font-size:12px; margin-bottom:14px;">' +
      '<tr><td style="padding:4px 0; color:#5C5347;">Age / Sex</td><td style="padding:4px 0;"><strong>' + scenario.age + " / " + escHtml(scenario.sex) + "</strong></td>" +
      '<td style="padding:4px 0; color:#5C5347;">Height / Weight</td><td style="padding:4px 0;"><strong>' + scenario.heightCm + " cm / " + scenario.weightKg + " kg</strong></td></tr>" +
      '<tr><td style="padding:4px 0; color:#5C5347;">Body Fat</td><td style="padding:4px 0;"><strong>' + (scenario.bodyFatPct == null ? "N/A (growth percentile)" : scenario.bodyFatPct + "%") + "</strong></td>" +
      '<td style="padding:4px 0; color:#5C5347;">Activity</td><td style="padding:4px 0;"><strong>' + escHtml(scenario.activityLabel) + "</strong></td></tr>" +
      '<tr><td style="padding:4px 0; color:#5C5347;">BMR / TDEE</td><td style="padding:4px 0;"><strong>' + fmt(targets.bmr) + " / " + fmt(targets.tdee) + " kcal</strong></td>" +
      '<td style="padding:4px 0; color:#5C5347;">Calorie Goal</td><td style="padding:4px 0;"><strong>' + fmt(targets.kcal) + " kcal</strong></td></tr>" +
      '<tr><td style="padding:4px 0; color:#5C5347;">Macro Targets</td><td colspan="3" style="padding:4px 0;"><strong>' +
      fmt(targets.protein) + "g protein (" + macroPct.protein + "%) · " + fmt(targets.carbs) + "g carb (" + macroPct.carbs + "%) · " +
      fmt(targets.fat) + "g fat (" + macroPct.fat + "%)</strong></td></tr>" +
      "</table>" +
      '<h2 style="font-size:18px; margin:18px 0 8px;">Foods Chosen (24 Hours)</h2>' + mealsHtml +
      '<h2 style="font-size:18px; margin:18px 0 8px;">Nutrient Report — Consumed vs. Target</h2>' +
      '<table style="width:100%; border-collapse:collapse; font-size:11px;">' +
      '<tr style="background:#E9E2D2;"><th style="text-align:left; padding:4px;">Nutrient</th><th style="text-align:right; padding:4px;">Consumed</th><th style="text-align:right; padding:4px;">Target</th><th style="text-align:right; padding:4px;">Status</th></tr>' +
      nutrientRowsHtml +
      "</table>" +
      '<h2 style="font-size:18px; margin:20px 0 8px; page-break-before:always;">Assessment Questions &amp; Answers</h2>' +
      questionsHtml +
      '<h2 style="font-size:18px; margin:20px 0 8px;">Answer Challenge (Optional)</h2>' +
      '<p style="font-size:12px; line-height:1.6; white-space:pre-wrap;">' +
      (vm.challengeText && vm.challengeText.trim() ? escHtml(vm.challengeText) : "<em>No challenge submitted.</em>") +
      "</p>"
    );
  }

  // ------------------------------------------------------------
  // Root render + focus preservation
  // ------------------------------------------------------------
  var appEl, printEl;

  function withFocusPreserved(fn) {
    var active = document.activeElement;
    var info = null;
    if (active && active.id && appEl && appEl.contains(active)) {
      info = {
        id: active.id,
        selStart: typeof active.selectionStart === "number" ? active.selectionStart : null,
        selEnd: typeof active.selectionEnd === "number" ? active.selectionEnd : null,
      };
    }
    var scrollBox = document.getElementById("food-list-scroll");
    var scrollTop = scrollBox ? scrollBox.scrollTop : null;

    fn();

    if (info) {
      var el = document.getElementById(info.id);
      if (el) {
        el.focus();
        if (info.selStart !== null && typeof el.setSelectionRange === "function") {
          try {
            el.setSelectionRange(info.selStart, info.selEnd);
          } catch (e) {}
        }
      }
    }
    if (scrollTop !== null) {
      var newScrollBox = document.getElementById("food-list-scroll");
      if (newScrollBox) newScrollBox.scrollTop = scrollTop;
    }
  }

  function render() {
    withFocusPreserved(function () {
      var vm = computeViewModel();
      var screenHtml = "";
      if (state.screen === "instructions") screenHtml = renderInstructions();
      else if (state.screen === "welcome") screenHtml = renderWelcome();
      else if (state.screen === "report" && vm.scenario) screenHtml = renderReport(vm);
      else if (state.screen === "builder" && vm.scenario) screenHtml = renderBuilder(vm);
      else if (state.screen === "dayreport" && vm.scenario) screenHtml = renderDayReport(vm);
      else if (state.screen === "questions" && vm.scenario) screenHtml = renderQuestions(vm);
      else if (state.screen === "final" && vm.scenario) screenHtml = renderFinal(vm);
      else screenHtml = renderWelcome();

      appEl.innerHTML =
        '<div class="app-chrome" style="min-height:100vh; background:var(--vc-gray-04); font-family:var(--font-sans); color:var(--color-fg); padding-bottom:80px;">' +
        '<div style="background:var(--vc-black); color:rgba(255,255,255,0.6); font-size:11px; padding:6px 32px; display:flex; justify-content:space-between; align-items:center;">' +
        "<span>Valencia College · NUR/HSC — Nutrition for Fitness</span><span>" + HEADER_RIGHT_TEXT + "</span></div>" +
        '<div style="background:var(--vc-red); padding:16px 32px; display:flex; align-items:center; justify-content:space-between;">' +
        '<div style="display:flex; align-items:center; gap:12px;">' +
        '<i class="bi bi-heart-fill" style="color:var(--vc-yellow); font-size:22px;"></i>' +
        '<div><div style="color:#fff; font-family:var(--font-serif); font-weight:700; font-size:20px; line-height:1.1;">24-Hour Nutrition Case Study</div>' +
        '<div style="color:rgba(255,255,255,0.75); font-size:12px;">Interactive Dynamic Assessment</div></div></div>' +
        '<div style="display:flex; gap:8px;">' +
        '<button style="background:transparent; border:1px solid rgba(255,255,255,0.5); color:#fff; border-radius:var(--radius-base); padding:8px 14px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit;" data-action="go-instructions"><i class="bi bi-info-circle"></i> Instructions</button>' +
        '<button style="background:transparent; border:1px solid rgba(255,255,255,0.5); color:#fff; border-radius:var(--radius-base); padding:8px 14px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit;" data-action="reset-all">Start Over</button>' +
        "</div>" +
        "</div>" +
        '<div style="max-width:1180px; margin:0 auto; padding:32px 24px;">' + screenHtml + "</div>" +
        "</div>";

      printEl.innerHTML = renderPrintReport(vm);
    });
  }

  // ------------------------------------------------------------
  // Event delegation
  // ------------------------------------------------------------
  function handleClick(e) {
    var target = e.target.closest("[data-action]");
    if (!target) return;
    var action = target.getAttribute("data-action");
    switch (action) {
      case "reset-all":
        resetAll();
        break;
      case "select-scenario":
        selectScenario(target.getAttribute("data-scenario-id"));
        break;
      case "go-welcome":
        goTo("welcome");
        break;
      case "go-instructions":
        goTo("instructions");
        break;
      case "go-builder":
        goTo("builder");
        break;
      case "go-questions":
        goToQuestions();
        break;
      case "set-category":
        setCategoryFilter(target.getAttribute("data-category"));
        break;
      case "set-meal":
        setActiveMeal(target.getAttribute("data-meal"));
        break;
      case "add-food":
        addFood(target.getAttribute("data-food-id"));
        break;
      case "inc-food":
        changeServings(target.getAttribute("data-meal"), target.getAttribute("data-food-id"), 0.5);
        break;
      case "dec-food":
        changeServings(target.getAttribute("data-meal"), target.getAttribute("data-food-id"), -0.5);
        break;
      case "remove-food":
        removeFood(target.getAttribute("data-meal"), target.getAttribute("data-food-id"));
        break;
      case "generate-report":
        if (!target.disabled) generateReport();
        break;
      case "submit-assessment":
        if (!target.disabled) submitAssessment();
        break;
      case "print-pdf":
        printPdf();
        break;
      default:
        break;
    }
  }

  function handleChange(e) {
    var target = e.target;
    if (target.matches('[data-action="select-answer"]')) {
      setAnswer(target.getAttribute("data-qid"), Number(target.getAttribute("data-idx")));
    }
  }

  function handleInput(e) {
    var target = e.target;
    if (target.matches('[data-field="search"]')) {
      setSearchTerm(target.value);
    } else if (target.matches('[data-field="student-name"]')) {
      changeStudentName(target.value);
    } else if (target.matches('[data-field="answer-text"]')) {
      changeOpenAnswer(target.getAttribute("data-qid"), target.value);
    } else if (target.matches('[data-field="challenge-text"]')) {
      changeChallengeText(target.value);
    }
  }

  function boot() {
    appEl = document.getElementById("app");
    printEl = document.getElementById("print-report");
    loadState();
    document.addEventListener("click", handleClick);
    document.addEventListener("change", handleChange);
    document.addEventListener("input", handleInput);
    render();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
